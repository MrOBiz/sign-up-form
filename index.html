<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Document</title>
</head>
<body>
    <div class="left">
        <div class="side-image">
            <img src="./mountain.jpg" alt="A beautiful mountain">
        </div> 
        <div class="logo">
            <img class="brand" src="./lightbulb.png" alt="Lightbulb logo">
            <h1 class="brand">BULB</h1>
        </div>
    </div>
    <div class="right">
        <div class="upper">
            <h2>This is not a real online service.</h2>
            <p>You do not need something like this in your life, yet here it is</p>
        </div>
        <form action="" method="get">
            <h3>Let's do this!</h3>
            <section>
                <label for="first-name">FIRST NAME</label>
                <input type="text" id="first-name" name="first-name" value="John">

                <label for="last-name">LAST NAME</label>
                <input type="text" id="last-name" name="last-name" value="Doe">

                <label for="email">EMAIL</label>
                <input type="email" 
                    id="email" 
                    name="email" 
                    value="e@mail.com"  
                    placeholder="personal@mail.com">

                <label for="tel-num">PHONE NUMBER</label>
                <input type="tel" id="tel-num" name="tel-num" value="0000-0000">

                <label for="password">PASSWORD</label>
                <input type="password" id="password" name="password" value="xxxx">

                <label for="confirm-psw">CONFIRM PASSWORD</label>
                <input type="password" id="confirm-psw" name="confirm-psw" value="xxxx">
            </section>
        </form>
        <div class="lower">
            <button type="submit">Create Account</button>

            <h4>Already have an account? <a href="">Log in</a></h4>
        </div>
    </div>
</body>
</html>
